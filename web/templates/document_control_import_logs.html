{% extends "base.html" %}
{% block title %}导入操作日志 · 文控中心{% endblock %}
{% block content %}
<div class="hero-bar d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
    <div>
        <h1>导入操作日志</h1>
        <p class="text-muted mb-0">Excel 导入成功、跳过、失败与注册关联记录。</p>
    </div>
    <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('document_control.document_control_page') }}">返回文控中心</a>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('pages.upload_page') }}">返回页面1</a>
    </div>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label small">批次号</label>
                <input id="dcImportBatchId" class="form-control form-control-sm" placeholder="导入后自动填入，可手工筛选">
            </div>
            <div class="col-md-3">
                <label class="form-label small">事件类型</label>
                <select id="dcImportEventType" class="form-select form-select-sm">
                    <option value="">全部</option>
                    <option value="import_success">导入成功</option>
                    <option value="import_update">增量更新</option>
                    <option value="import_skip">跳过</option>
                    <option value="import_fail">失败</option>
                    <option value="registration_link">注册关联</option>
                </select>
            </div>
            <div class="col-md-5 d-flex gap-2">
                <button id="dcImportLogsBtn" class="btn btn-primary btn-sm">查询</button>
                <button id="dcImportLogsResetBtn" class="btn btn-outline-secondary btn-sm">重置</button>
            </div>
        </div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span>批次汇总</span>
        <span id="dcImportBatchSummaryHint" class="small text-muted"></span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>导入时间</th>
                        <th>批次号</th>
                        <th>合计</th>
                        <th>新增</th>
                        <th>更新</th>
                        <th>跳过</th>
                        <th>失败</th>
                        <th>注册关联</th>
                        <th style="width:5rem">操作</th>
                    </tr>
                </thead>
                <tbody id="dcImportBatchSummaryBody">
                    <tr><td colspan="9" class="text-muted p-3">加载中…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span>日志明细</span>
        <div class="d-flex align-items-center gap-2">
            <span id="dcImportLogsHint" class="small text-muted"></span>
            <div class="btn-group btn-group-sm">
                <button type="button" id="dcImportLogsPrev" class="btn btn-outline-secondary">上一页</button>
                <button type="button" id="dcImportLogsNext" class="btn btn-outline-secondary">下一页</button>
            </div>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>时间</th>
                        <th>批次</th>
                        <th>类型</th>
                        <th>Sheet</th>
                        <th>文件编号</th>
                        <th>原因</th>
                    </tr>
                </thead>
                <tbody id="dcImportLogsBody">
                    <tr><td colspan="6" class="text-muted p-3">加载中…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block body_extra %}
<script src="{{ url_for('static', filename='js/document_control_import_logs.js', v=static_version) }}"></script>
{% endblock %}
