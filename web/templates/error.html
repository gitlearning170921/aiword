{% extends "base.html" %}
{% block title %}{{ title or "提示" }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm mt-5 border-0">
            <div class="card-body p-4 p-md-5 text-center">
                <h3 class="fw-bold text-danger mb-3">{{ title or "无法继续" }}</h3>
                <p class="text-muted mb-4">{{ message or "发生错误，请稍后重试。" }}</p>
                <div class="d-flex flex-wrap gap-2 justify-content-center">
                    {% if back_url %}
                    <a class="btn btn-primary btn-sm" href="{{ back_url }}">{{ back_label or "返回" }}</a>
                    {% endif %}
                    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('pages.login_page') }}">登录页</a>
                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="location.reload()">刷新</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
