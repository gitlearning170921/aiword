{% extends "base.html" %}
{% block title %}登录 - 页面2{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">AI Word 工具</h3>
                    <p class="text-muted">请登录以使用页面2功能</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="loginUsername" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">登录</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">账号由页面1管理员创建</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
