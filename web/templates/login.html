{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">AI Word 工具</h3>
                    <p class="text-muted mb-0">请使用您的账号登录</p>
                    {% if is_page13_super_admin %}
                    <p class="small text-muted mb-0 mt-2">登录后将按<strong>分级角色</strong>自动进入对应页面：公司管理员→页面0；项目管理员→页面1；普通账号→页面2。项目管理员须已由超级管理员分配<strong>所属项目组</strong>。</p>
                    {% endif %}
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="loginUsername" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">登录</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">账号与初始密码由超级管理员在页面4创建分配；忘记密码请联系超级管理员</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
