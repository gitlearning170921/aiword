<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="Segoe UI, Microsoft YaHei, sans-serif">
  <rect width="720" height="340" fill="#f8f9fa"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#212529">我的任务（普通用户）</text>
  <rect x="24" y="44" width="672" height="44" rx="6" fill="#ffffff" stroke="#dee2e6"/>
  <text x="40" y="72" font-size="12" fill="#495057">我的任务 · [ 初稿生成 ] [ 退出登录 ]</text>
  <rect x="24" y="100" width="672" height="200" rx="6" fill="#ffffff" stroke="#fd7e14"/>
