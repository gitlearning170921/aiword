upstream aiword_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# 仅补充 gzip 类型（gzip on 已在主 nginx.conf）
gzip_types
    text/plain text/css application/json application/javascript
    application/xml text/javascript image/svg+xml
    application/font-woff application/font-woff2 application/wasm;

server {
    listen 80;
    server_name aiword.yuwell.com;
    client_max_body_size 30m;

    location ^~ /static/ {
        proxy_pass http://aiword_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://aiword_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
}