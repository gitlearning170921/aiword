# 生产默认：Nginx 对外 80 → aiword:5000（域名无需写端口）
# 用法: docker compose -f deploy/docker-compose.prod.yml up -d
# HTTPS: 将 fullchain.pem / privkey.pem 放入 deploy/nginx/certs/ 并取消下方 443 server 注释

upstream aiword_backend {
    server aiword:5000;
    keepalive 8;
}

server {
    listen 80;
    server_name aiword.yuwell.com;

    client_max_body_size 30m;

    location / {
        proxy_pass http://aiword_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
}

# 用 IP 直接访问时也转发到 aiword（便于未配 DNS 时排查）
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 30m;

    location / {
        proxy_pass http://aiword_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
}

