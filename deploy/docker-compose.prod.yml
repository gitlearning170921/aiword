# 生产部署：仅使用预构建镜像，不在服务器上 build
# 用法：docker compose -f docker-compose.prod.yml up -d
# 对外：Nginx 80 → aiword:5000（访问 http://aiword.yuwell.com 无需 :5000）

name: aiword-stack

services:
  aiword:
    image: ${AIWORD_IMAGE:?set AIWORD_IMAGE in .env}
    container_name: aiword
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      AIWORD_CONSOLE_LOG: ${AIWORD_CONSOLE_LOG:-1}
      AIWORD_LOG_LEVEL: ${AIWORD_LOG_LEVEL:-INFO}
    extra_hosts:
      # 让容器内 host.docker.internal 解析到宿主机；MYSQL_HOST=host.docker.internal 时必需
      - "host.docker.internal:host-gateway"
    volumes:
      - aiword_instance:/app/instance
      - aiword_uploads:/app/uploads
      - aiword_outputs:/app/outputs
    depends_on:
      aicheckword:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/integration/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  aicheckword:
    image: ${AICHECKWORD_IMAGE:?set AICHECKWORD_IMAGE in .env}
    container_name: aicheckword
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # 远程 Chroma：容器内用服务名 chroma:8000（开发机 Streamlit 用宿主机 IP:8100）
      CHROMA_SERVER_HOST: ${CHROMA_SERVER_HOST:-chroma}
      CHROMA_SERVER_PORT: ${CHROMA_SERVER_PORT:-8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - aicheck_knowledge:/app/knowledge_store
      - aicheck_uploads:/app/uploads
      - aicheck_training:/app/training_docs
    depends_on:
      chroma:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  chroma:
    image: ${CHROMA_IMAGE:?set CHROMA_IMAGE in .env}
    container_name: aiword-chroma
    expose:
      - "8000"
    ports:
      # 供开发机 Streamlit 访问；仅内网，勿暴露公网
      - "${CHROMA_PUBLISH_PORT:-8100}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: aiword-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      aiword:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

networks:
  appnet:
    driver: bridge

volumes:
  aiword_instance:
  aiword_uploads:
  aiword_outputs:
  aicheck_knowledge:
  aicheck_uploads:
  aicheck_training:
  chroma_data:
