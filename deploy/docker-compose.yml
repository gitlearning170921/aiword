# 本地开发/本机联调：含 build 段，可 --build
# 生产 Linux 服务器请用 docker-compose.prod.yml（仅预构建镜像）

name: aiword-stack

services:
  aiword:
    image: ${AIWORD_IMAGE:-aiword:local}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: aiword
    ports:
      - "${AIWORD_PUBLISH_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      AIWORD_CONSOLE_LOG: ${AIWORD_CONSOLE_LOG:-1}
      AIWORD_LOG_LEVEL: ${AIWORD_LOG_LEVEL:-INFO}
    volumes:
      - aiword_instance:/app/instance
      - aiword_uploads:/app/uploads
      - aiword_outputs:/app/outputs
    depends_on:
      aicheckword:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/integration/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  aicheckword:
    image: ${AICHECKWORD_IMAGE:-aicheckword:local}
    build:
      context: ../../aicheckword
      dockerfile: Dockerfile
    container_name: aicheckword
    ports:
      - "${AICHECKWORD_PUBLISH_PORT:-8000}:8000"
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - aicheck_knowledge:/app/knowledge_store
      - aicheck_uploads:/app/uploads
      - aicheck_training:/app/training_docs
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # 可选：知识库训练 Streamlit UI（profile admin，不进默认生产 zip）
  aicheckword-streamlit:
    profiles: ["admin"]
    image: ${AICHECKWORD_STREAMLIT_IMAGE:-aicheckword-streamlit:local}
    build:
      context: ../../aicheckword
      dockerfile: Dockerfile.streamlit
      args:
        AICHECKWORD_BASE_TAG: ${IMAGE_VERSION:-local}
    container_name: aicheckword-streamlit
    ports:
      - "${AICHECKWORD_STREAMLIT_PORT:-8501}:8501"
    env_file:
      - .env
    volumes:
      - aicheck_knowledge:/app/knowledge_store
      - aicheck_uploads:/app/uploads
      - aicheck_training:/app/training_docs
    depends_on:
      aicheckword:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

  # 可选：本机模拟生产域名反代（profile nginx，80 → aiword:5000）
  nginx:
    profiles: ["nginx"]
    image: nginx:1.27-alpine
    container_name: aiword-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      aiword:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

networks:
  appnet:
    driver: bridge

volumes:
  aiword_instance:
  aiword_uploads:
  aiword_outputs:
  aicheck_knowledge:
  aicheck_uploads:
  aicheck_training:
